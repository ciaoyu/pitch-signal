name: Deploy to Render

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Check Render configuration
        id: render-config
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
          RENDER_APP_URL: ${{ secrets.RENDER_APP_URL }}
        run: |
          if [ -n "$RENDER_DEPLOY_HOOK" ] && [ -n "$RENDER_APP_URL" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "Render secrets are not configured; skipping backup deployment."
          fi

      - name: Trigger Render Deploy Hook
        if: ${{ steps.render-config.outputs.configured == 'true' }}
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          curl -X POST "$RENDER_DEPLOY_HOOK" \
            -H "Content-Type: application/json" \
            --silent --show-error --fail

      - name: Wait for Render deployment
        if: ${{ steps.render-config.outputs.configured == 'true' }}
        run: sleep 30

      - name: Verify deployment
        if: ${{ steps.render-config.outputs.configured == 'true' }}
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$RENDER_APP_URL/health")
          echo "Health check status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "❌ Health check failed"
            exit 1
          fi
          echo "✅ Render deployment verified"
        env:
          RENDER_APP_URL: ${{ secrets.RENDER_APP_URL }}
