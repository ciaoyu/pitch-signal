name: Deploy to Railway

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      # Railway is connected directly to this GitHub repository and deploys main.
      # This workflow verifies that the production service becomes healthy.
      - name: Wait for Railway deployment
        run: |
          for attempt in $(seq 1 18); do
            if curl --fail --silent --show-error "$HEALTH_URL" > /dev/null; then
              echo "Railway production is healthy."
              exit 0
            fi
            echo "Waiting for Railway deployment ($attempt/18)..."
            sleep 10
          done
          echo "Railway production did not become healthy in time."
          exit 1
        env:
          HEALTH_URL: https://pitch-signal-production.up.railway.app/health
