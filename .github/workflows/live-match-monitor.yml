name: Live Match Monitor

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm
      - run: npm ci
      - name: Run live match monitor once
        env:
          NODE_ENV: production
          THE_ODDS_API_KEY: ${{ secrets.THE_ODDS_API_KEY }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: node scripts/live-match-monitor.js --once
      - name: Upload live snapshots
        uses: actions/upload-artifact@v4
        with:
          name: live-match-snapshots
          path: data/live-snapshots
          if-no-files-found: ignore
